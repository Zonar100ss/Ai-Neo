<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лира — Нейросеть</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f13;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a24;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2d2d3d;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #7c4dff, #00e5ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }
        .info h1 { font-size: 18px; }
        .info p { font-size: 12px; color: #00e5ff; }
        .status {
            font-size: 11px;
            color: #6a6a7a;
            margin-top: 4px;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
        }
        .message.user {
            align-self: flex-end;
            background: #7c4dff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: #1a1a24;
            border: 1px solid #2d2d3d;
            border-bottom-left-radius: 4px;
        }
        .message-meta {
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
        }
        .input-container {
            padding: 12px 16px;
            background: #1a1a24;
            border-top: 1px solid #2d2d3d;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            background: #0f0f13;
            border: 1px solid #2d2d3d;
            border-radius: 24px;
            padding: 8px 12px;
        }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }
        .send-btn {
            background: #7c4dff;
            border: none;
            border-radius: 24px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
        }
        .typing {
            display: none;
            align-self: flex-start;
            background: #1a1a24;
            padding: 10px 14px;
            border-radius: 18px;
            gap: 4px;
        }
        .typing.active { display: flex; }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .welcome h3 { color: #fff; margin-bottom: 8px; }
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 10px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="avatar">Л</div>
    <div class="info">
        <h1>Лира</h1>
        <p>Нейросеть локально</p>
        <div class="status" id="status">🟡 Загрузка...</div>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
        <h3>✨ Добро пожаловать</h3>
        <p>Я Лира, нейросеть. Спрашивай о чём угодно!</p>
    </div>
    <div class="typing" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
    </div>
</div>

<div class="input-container">
    <div class="input-wrapper">
        <input type="text" class="input-field" id="userInput" placeholder="Напиши сообщение...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<div class="footer">
    RP Companion • Transformers.js • TinyLlama
</div>

<script type="importmap">
    {
        "imports": {
            "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.5"
        }
    }
</script>

<script type="module">
    import { pipeline, env } from '@xenova/transformers';
    
    // РЕШЕНИЕ ПРОБЛЕМЫ: отключаем поиск onnxruntime-node
    // и принудительно используем WebAssembly в браузере
    if (typeof window !== 'undefined') {
        // Указываем путь к WASM файлам
        env.backends.onnx.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.5/dist/';
        // Отключаем Node.js режим
        env.backends.onnx.isNode = false;
        // Разрешаем локальные модели
        env.allowLocalModels = false;
        env.allowRemoteModels = true;
    }
    
    let generator = null;
    let isReady = false;
    const statusEl = document.getElementById('status');
    
    async function loadModel() {
        if (isReady) return true;
        
        statusEl.innerHTML = '🟡 Загрузка нейросети TinyLlama...';
        console.log('[Core] Загрузка модели...');
        
        try {
            generator = await pipeline('text-generation', 'Xenova/tiny-llama-1.1b', {
                progress_callback: (p) => {
                    statusEl.innerHTML = '🟡 Загрузка... ' + Math.round(p * 100) + '%';
                }
            });
            
            isReady = true;
            statusEl.innerHTML = '🟢 Нейросеть готова';
            console.log('[Core] Модель загружена!');
            return true;
        } catch(e) {
            console.error('[Core] Ошибка:', e);
            statusEl.innerHTML = '🔴 Ошибка загрузки: ' + e.message;
            return false;
        }
    }
    
    async function generateResponse(input) {
        if (!isReady) {
            await loadModel();
            if (!isReady) return 'Нейросеть загружается... Подожди.';
        }
        
        try {
            const result = await generator(input, {
                max_new_tokens: 80,
                temperature: 0.7,
                do_sample: true
            });
            let response = result[0].generated_text;
            response = response.replace(input, '').trim();
            return response || '...';
        } catch(e) {
            console.error('[Core] Ошибка генерации:', e);
            return '⚠️ Ошибка. Попробуй ещё раз.';
        }
    }
    
    // API для интерфейса
    window.Core = {
        init: () => loadModel(),
        respond: async (input) => {
            const text = await generateResponse(input);
            return { text: text };
        },
        session: { start: () => ({ id: Date.now() }), getInfo: () => ({}) },
        context: { getStats: () => ({}) }
    };
    
    // ============================================
    // INTERFACE
    // ============================================
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function addMessage(role, text) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.style.display = 'none';
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const name = role === 'user' ? 'Вы' : 'Лира';
        messageDiv.innerHTML = `<div class="message-meta">${name} • ${time}</div><div class="message-content">${escapeHtml(text)}</div>`;
        
        const container = document.getElementById('chatContainer');
        const typing = document.getElementById('typing');
        if (typing && typing.parentNode) {
            container.insertBefore(messageDiv, typing);
        } else {
            container.appendChild(messageDiv);
        }
        container.scrollTop = container.scrollHeight;
    }
    
    function showTyping(show) {
        const typing = document.getElementById('typing');
        if (typing) typing.classList.toggle('active', show);
    }
    
    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;
        
        addMessage('user', text);
        input.value = '';
        
        showTyping(true);
        try {
            const response = await window.Core.respond(text);
            showTyping(false);
            addMessage('ai', response.text);
        } catch(e) {
            showTyping(false);
            addMessage('ai', '⚠️ Ошибка');
            console.error(e);
        }
    }
    
    function initInterface() {
        document.getElementById('sendBtn').onclick = handleSend;
        const input = document.getElementById('userInput');
        input.onkeydown = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSend();
            }
        };
        window.Core.init();
        console.log('[Interface] Ready');
    }
    
    initInterface();
</script>

</body>
</html>
